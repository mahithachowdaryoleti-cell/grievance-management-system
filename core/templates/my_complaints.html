{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>My Complaints</title>

<style>

table{
width:80%;
margin:auto;
border-collapse:collapse;
}

th, td{
padding:10px;
border:1px solid #ccc;
text-align:center;
}

th{
background:#2c3e50;
color:white;
}

</style>

</head>

<body>

<h2 style="text-align:center">My Complaints</h2>

<table>

<tr>
<th>ID</th>
<th>Title</th>
<th>Category</th>
<th>Authority</th>
<th>Status</th>
<th>Date</th>
</tr>

{% for g in grievances %}

<tr>

<td>{{ g.id }}</td>
<td><a href="{% url 'complaint_detail' g.id %}">
{{ g.title }}
</a></td>
<td>{{ g.category.category_name }}</td>
<td>{{ g.authority.designation }}</td>
<td>{{ g.status }}</td>
<td>{{ g.created_at }}</td>

</tr>

{% empty %}

<tr>
<td colspan="6">No complaints submitted</td>
</tr>

{% endfor %}

</table>

</body>
</html>
