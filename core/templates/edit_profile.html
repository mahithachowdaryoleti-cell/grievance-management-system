<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: #f4f6f9;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            background: #2c5364;
            color: white;
            border: none;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Edit Profile</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Email</label>
        <input type="email" name="email" value="{{ user.email }}">

        <!-- 🔥 Only for staff -->
        {% if authority.role == "staff" %}
            <label>Designation</label>
            <input type="text" name="designation" value="{{ authority.designation }}">
        {% endif %}

        <button type="submit">Save Changes</button>
    </form>
</div>

</body>
</html>
