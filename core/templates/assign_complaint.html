<h2>Assign Complaint</h2>

<form method="POST">
    {% csrf_token %}

    <p><strong>{{ grievance.title }}</strong></p>

    <label>Select Staff:</label>
    <select name="authority" required>
        {% for a in authorities %}
            <option value="{{ a.id }}">{{ a.designation }}</option>
        {% endfor %}
    </select>

    <br><br>

    <button type="submit">Assign</button>
</form>
